      dest: "data/MPR Actuals and Goals_v2.xlsx"
    - name: "GSE MPR - Template.pptx"
      dest: "templates/GSE MPR - Template.pptx"
    - name: "2026 - GSE Scorecards.xlsx"
      dest: "data/2026 - GSE Scorecards.xlsx"
