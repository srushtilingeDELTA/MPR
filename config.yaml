  sheet_name: "May Actuals"
  header_row: 0
  source: "sharepoint"

workbooks:
  actuals:
    path: "data/MPR Actuals and Goals_v2.xlsx"
    header_row: 0
  workings:
    path: "data/New GSE MPR Workings.xlsx"
