sharepoint:
  site_url: "https://deltaairlines.sharepoint.com/sites/DL002488"
  library: "GSE MPR Documents"
  folder: "6 - TESTING"
  server_folder_path: "/sites/DL002488/MPR  Research/GSE MPR Documents/6 - TESTING"
  folder_page_url: "https://deltaairlines.sharepoint.com/sites/DL002488/SitePages/Home.aspx?RootFolder=%2Fsites%2FDL002488%2FMPR%20%20Research%2FGSE%20MPR%20Documents%2F6%20%2D%20TESTING&FolderCTID=0x0120002CC7103732886141A53F050CFF5FF8E0&View=%7BB871FEB2%2DD865%2D4C61%2DB460%2D3E2437A9F7E3%7D"
