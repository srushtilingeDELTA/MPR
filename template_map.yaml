# Template element map for GSE MPR - Template.pptx
# Preserve template look: only update mapped data elements.
# Replace template pictures with live Excel screenshots when configured.
# Do not clear pictures/text unless a replacement is successfully applied.

slides:
  - index: 0
    name: cover
    keep_title: true
    elements:
      - type: month_tokens

  - index: 1
    name: agenda
    keep_title: true
    elements:
      - type: agenda

  # PPT 3 — System Scorecard from 2026 - GSE Scorecards.xlsx → System tab
  # Safety & Security + Customer Experience + Operations
  - index: 2
    name: scorecard_summary_1
    keep_title: true
    elements:
      - type: scorecard_screenshot
        workbook: scorecards
        sheet: System
        sections: match
        match:
          - "Safety & Security"
          - "Customer Experience"
          - "Operations"
        fallback_indices: [0, 1, 2]
        replace_existing_pictures: true
        fit: fill
        grow: 1.06
        optional: false

  # PPT 4 — System Scorecard from same System tab
  # People + Finance + Overall Total Score (no OPPORTUNITIES footer)
  - index: 3
    name: scorecard_summary_2
    keep_title: true
    elements:
      - type: scorecard_screenshot
        workbook: scorecards
        sheet: System
        sections: match
        match:
          - "People"
          - "Finance"
          - "Financial"
          - "Overall and Opportunities"
          - "Overall"
          - "Opportunities"
        fallback_indices: [3, 4, 5]
        replace_existing_pictures: true
        fit: fill
        grow: 1.06
        optional: false

  # PPT 5 — GIR from New GSE MPR Workings.xlsx → GIR tab
  # Multiple panel screenshots mapped into template slots (not the raw ALL/NO 115 dumps).
  # Leading Issues / Action Plan body text cleared to empty editable boxes.
  - index: 4
    name: gir
    keep_title: true
    elements:
      - type: gir_workings_panels
        workbook: workings
        sheet: "GIR"
        sheet_match: ["GIR"]
        clear_narrative: true
        fit: fill
        optional: false
        # Optional explicit Excel ranges if auto-detect misses a block:
        # ranges:
        #   chart: "A1:G20"
        #   summary: "H1:J12"
        #   injury: "K1:P18"
        #   recordable: "A22:N25"
        #   metric: "A27:N32"

  # PPT 6 — EA Compliance / ASAP (template picture → live screenshot when sheet exists)
  - index: 5
    name: ea_asap
    keep_title: true
    elements:
      - type: scorecard_screenshot
        workbook: scorecards
        sheet_match: ["EA", "ASAP", "Compliance"]
        sections: sheet
        replace_existing_pictures: true
        fit: fill
        optional: true
      - type: clear_narrative
        # Empty Leading Issues / Action Plan body text boxes (headers kept)

  # PPT 7 — People (live table + charts from actuals)
  - index: 6
    name: people
    keep_title: true
    elements:
      - type: people_table
        workbook: actuals
        rows:
          - label: "LEADERSHIP ENGAGEMENT"
            patterns: ["Leadership Engagement", "LEADERSHIP ENGAGEMENT"]
          - label: "PSYCHOLOGICAL SAFETY"
            patterns: ["Psychological Safety", "PSYCHOLOGICAL SAFETY"]
          - label: "ACCOUNTABILITY"
            patterns: ["Accountability", "ACCOUNTABILITY"]
      - type: people_charts
        workbook: actuals
        charts:
          - title: "Leadership Engagement"
            patterns: ["Leadership Engagement", "LEADERSHIP ENGAGEMENT"]
          - title: "Psychological Safety"
            patterns: ["Psychological Safety", "PSYCHOLOGICAL SAFETY"]
          - title: "Accountability"
            patterns: ["Accountability", "ACCOUNTABILITY"]

  # PPT 8 — Finance overview (workings workbook screenshot)
  - index: 7
    name: finance_overview
    keep_title: true
    elements:
      - type: scorecard_screenshot
        workbook: workings
        sheet_index: 0
        sections: sheet
        replace_existing_pictures: true
        fit: fill
        optional: true

  # PPT 9-10 — Finance narrative (manual)
  - index: 8
    name: finance_comments_1
    keep_title: true

  - index: 9
    name: finance_comments_2
    keep_title: true

  # PPT 11 — PMI charts
  - index: 10
