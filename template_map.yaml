# Template element map for GSE MPR - Template.pptx (from github.com/srushtisl20/DELTA main)
# Refresh inventory: python scripts/dump_template_inventory.py
#
# PowerPoint slide number = index + 1
#
# Rules:
# - Data comes from workbooks: actuals | workings | scorecards
# - Missing numeric cells on data slides show DNF (GIR) or "Data not found for …" (other slides)
# - Charts without data → "Chart for X needs to be inserted here."
# - Leading Issues / Action Plan → blank textboxes (manual entry)
# - Template data images removed on filled slides

slides:
  - index: 0
    name: cover
    keep_title: true
    elements:
      - type: month_tokens

  - index: 1
    name: agenda
    keep_title: true
    elements:
      - type: agenda_slide
        header:
          title: "GSE Monthly Performance Summary"
          time: "5 min"
        sections:
          - { title: "Safety", time: "10 min" }
          - { title: "People", time: "10 min" }
          - { title: "Finance", time: "10 min" }
          - { title: "Customer Experience", time: "10 min" }
          - { title: "North (M)", time: "10 min" }
          - { title: "South (M)", time: "10 min" }
          - { title: "Stationary", time: "15 min" }
          - { title: "Galley", time: "10 min" }
          - { title: "Closing", time: "3 min" }
        clear_detail_text: true

  # PPT 3 — System Scorecard (Safety/Customer/Ops/People) — template has PICTURE; needs native TABLE
  - index: 2
    name: scorecard_summary_1
    keep_title: true
    elements:
      - type: system_scorecard_table
        workbook: scorecards
        block: summary_1
        fill_mode: full
        optional: true

  # PPT 4 — System Scorecard (Finance/People footer)
  - index: 3
    name: scorecard_summary_2
    keep_title: true
    elements:
      - type: system_scorecard_table
        workbook: scorecards
        block: summary_2
        fill_mode: full
        optional: true

  # PPT 5 — GIR
  - index: 4
    name: gir
    keep_title: true
    elements:
      - type: gir_tables
        workbook: actuals
        kpis:
          gir: GIR
          injury_count: "Injury Count"
      - type: gir_charts
        workbook: actuals
        kpi: GIR

  # PPT 6 — EA Compliance / ASAP — template has PICTURE only (no native table yet)
  - index: 5
    name: ea_asap
    keep_title: true
    elements:
      - type: ea_asap_tables
        workbook: actuals
        kpis:
          eac: EAC
          asap: ASAP

  # PPT 7 — People survey
  - index: 6
    name: people
    keep_title: true
    elements:
      - type: people_table
        workbook: actuals
        rows:
          - label: "LEADERSHIP ENGAGEMENT"
            patterns: ["Leadership Engagement", "LEADERSHIP ENGAGEMENT"]
          - label: "PSYCHOLOGICAL SAFETY"
            patterns: ["Psychological Safety", "PSYCHOLOGICAL SAFETY"]
          - label: "ACCOUNTABILITY"
            patterns: ["Accountability", "ACCOUNTABILITY"]
      - type: people_charts
        workbook: actuals
        charts:
          - title: "Leadership Engagement"
            patterns: ["Leadership Engagement", "LEADERSHIP ENGAGEMENT"]
          - title: "Psychological Safety"
            patterns: ["Psychological Safety", "PSYCHOLOGICAL SAFETY"]
          - title: "Accountability"
            patterns: ["Accountability", "ACCOUNTABILITY"]

  # PPT 8 — Finance overview (workings screenshot → native table)
  - index: 7
    name: finance_overview
    keep_title: true
    elements:
      - type: workings_table
        workbook: workings
        sheet: null
        optional: true

  # PPT 9-10 — Finance comments (manual narrative)
  - index: 8
    name: finance_comments_1
    keep_title: true
    clear_non_titles: true

  - index: 9
    name: finance_comments_2
    keep_title: true
    clear_non_titles: true

  # PPT 11 — PMI
  - index: 10
    name: pmi
    keep_title: true
    elements:
      - type: chart_slide
        workbook: actuals
        charts:
          - title: Motorized
            patterns: ["PM (M)"]
          - title: Stationary
            patterns: ["PM (S)"]

  # PPT 12 — ISR
  - index: 11
    name: isr
    keep_title: true
    elements:
      - type: chart_slide
        workbook: actuals
        charts:
          - title: Reliability
            patterns: ["REL"]
          - title: Severity
            patterns: ["SEV"]

  # PPT 13 — ISR comments (manual)
  - index: 12
    name: isr_comments
    keep_title: true
    clear_non_titles: true

  # PPT 14-19 — Entity scorecards (pictures in template; sheet_index TBD per entity)
  - index: 13
    name: north_scorecard_summary
    keep_title: true
    clear_pictures: true
    elements:
      - type: scorecard_sheet
        workbook: scorecards
        sheet_index: 2
        optional: true

  - index: 14
    name: north_scorecard_comparison
    keep_title: true
    clear_pictures: true
    elements:
      - type: scorecard_sheet
        workbook: scorecards
        sheet_index: 3
        optional: true

  - index: 15
    name: south_scorecard_summary
    keep_title: true
    clear_pictures: true
    elements:
      - type: scorecard_sheet
        workbook: scorecards
        sheet_index: 4
        optional: true

  - index: 16
    name: south_scorecard_comparison
    keep_title: true
    clear_pictures: true
    elements:
      - type: scorecard_sheet
        workbook: scorecards
        sheet_index: 5
        optional: true

  - index: 17
    name: stationary_scorecard_summary
    keep_title: true
    clear_pictures: true
    elements:
      - type: scorecard_sheet
        workbook: scorecards
        sheet_index: 6
        optional: true

  - index: 18
    name: stationary_scorecard_comparison
    keep_title: true
    clear_pictures: true
    elements:
      - type: scorecard_sheet
        workbook: scorecards
        sheet_index: 7
        optional: true

  # PPT 20 — Operations (Jam Rate / Clear Times)
  - index: 19
    name: operations
    keep_title: true
    elements:
      - type: chart_slide
        workbook: actuals
        charts:
          - title: "Jam Rate"
            patterns: ["Jams"]
          - title: "Clear Times"
            patterns: ["Clear Times", "Clear Time"]

  # PPT 21 — Operations comments (manual)
  - index: 20
    name: operations_comments
    keep_title: true
    clear_non_titles: true

  # PPT 22 — VOS
  - index: 21
    name: vos
    keep_title: true
    elements:
      - type: chart_slide
        workbook: actuals
        charts:
          - title: ""
            patterns: ["VOS (S)"]

  # PPT 23 — Station of the Quarter (manual / diagram)
  - index: 22
    name: station_winners
    keep_title: true
    clear_non_titles: true

  # PPT 24-25 — Galley scorecards
  - index: 23
    name: galley_scorecard_summary
    keep_title: true
    clear_pictures: true
    elements:
      - type: scorecard_sheet
        workbook: scorecards
        sheet_index: 8
        optional: true

  - index: 24
    name: galley_scorecard_comparison
    keep_title: true
    clear_pictures: true
    elements:
      - type: scorecard_sheet
        workbook: scorecards
        sheet_index: 9
        optional: true
