# Template element map for GSE MPR - Template.pptx
# Preserve template look: only update mapped data elements.
# Do not clear pictures/text unless a replacement is successfully applied.

slides:
  - index: 0
    name: cover
    keep_title: true
    elements:
      - type: month_tokens

  - index: 1
    name: agenda
    keep_title: true
    elements:
      # Restore Planned Discussion topics/times (never clear this slide).
      - type: agenda

  # PPT slides 3-4 = System Scorecard screenshots from Scorecards → System tab
  - index: 2
    name: scorecard_summary_1
    keep_title: true
    elements:
      - type: scorecard_screenshot
        workbook: scorecards
        sheet: System
        sections: match
        match:
          - "Safety & Security"
          - "Customer Experience"
          - "Operations"
        fallback_indices: [0, 1, 2]
        replace_existing_pictures: true
        fit: fill
        optional: false

  - index: 3
    name: scorecard_summary_2
    keep_title: true
    elements:
      - type: scorecard_screenshot
        workbook: scorecards
        sheet: System
        sections: match
        match:
          - "People"
          - "Finance"
          - "Financial"
          - "Overall"
          - "Opportunities"
        fallback_indices: [3, 4, 5]
        replace_existing_pictures: true
        fit: fill
        optional: false

  - index: 4
    name: gir
    keep_title: true
    elements:
      - type: gir_tables
        workbook: actuals
        kpis:
          gir: GIR
          injury_count: "Injury Count"
      - type: gir_charts
        workbook: actuals
        kpi: GIR

  - index: 5
    name: safety_other
    keep_title: true

  - index: 6
    name: people
    keep_title: true
    elements:
      - type: people_table
        workbook: actuals
        rows:
          - label: "LEADERSHIP ENGAGEMENT"
            patterns: ["Leadership Engagement", "LEADERSHIP ENGAGEMENT"]
          - label: "PSYCHOLOGICAL SAFETY"
            patterns: ["Psychological Safety", "PSYCHOLOGICAL SAFETY"]
          - label: "ACCOUNTABILITY"
            patterns: ["Accountability", "ACCOUNTABILITY"]
      - type: people_charts
        workbook: actuals
        charts:
          - title: "Leadership Engagement"
            patterns: ["Leadership Engagement", "LEADERSHIP ENGAGEMENT"]
          - title: "Psychological Safety"
            patterns: ["Psychological Safety", "PSYCHOLOGICAL SAFETY"]
          - title: "Accountability"
            patterns: ["Accountability", "ACCOUNTABILITY"]

  - index: 7
    name: people_other
    keep_title: true

  - index: 8
    name: pmi_intro
    keep_title: true

  - index: 9
    name: pmi_summary
    keep_title: true

  - index: 10
    name: pmi
    keep_title: true
    elements:
      - type: chart_slide
        workbook: actuals
        charts:
          - title: Motorized
            patterns: ["PM (M)"]
          - title: Stationary
            patterns: ["PM (S)"]

  - index: 11
    name: isr
    keep_title: true
    elements:
      - type: chart_slide
        workbook: actuals
        charts:
          - title: Reliability
            patterns: ["REL"]
          - title: Severity
            patterns: ["SEV"]

  - index: 12
    name: isr_other
    keep_title: true

  - index: 13
    name: entity_scorecard_1
    keep_title: true

  - index: 14
    name: entity_scorecard_2
    keep_title: true

  - index: 15
    name: entity_scorecard_3
    keep_title: true

  - index: 16
    name: entity_scorecard_4
    keep_title: true

  - index: 17
    name: entity_scorecard_5
    keep_title: true

  - index: 18
    name: entity_scorecard_6
    keep_title: true

  - index: 19
    name: operations
    keep_title: true
    elements:
      - type: chart_slide
        workbook: actuals
        charts:
          - title: "Jam Rate"
            patterns: ["Jams"]
          - title: "Clear Times"
            patterns: ["Times"]

  - index: 20
    name: operations_other
    keep_title: true

  - index: 21
    name: vos
    keep_title: true
    elements:
      - type: chart_slide
        workbook: actuals
        charts:
          - title: ""
            patterns: ["VOS (S)"]

  - index: 22
    name: financials
    keep_title: true
    elements:
      - type: workings_table
        workbook: workings
        sheet: null
        optional: true

  - index: 23
    name: appendix_1
    keep_title: true

  - index: 24
    name: appendix_2
    keep_title: true
