# Template element map for GSE MPR - Template.pptx
# Preserve template look: only update mapped data elements.
# Replace template pictures with live Excel screenshots when configured.
# Do not clear pictures/text unless a replacement is successfully applied.

slides:
  - index: 0
    name: cover
    keep_title: true
    elements:
      - type: month_tokens

  - index: 1
    name: agenda
    keep_title: true
    elements:
      - type: agenda

  # PPT 3 — System Scorecard from 2026 - GSE Scorecards.xlsx → System tab
  # Safety & Security + Customer Experience + Operations
  - index: 2
    name: scorecard_summary_1
    keep_title: true
    elements:
      - type: scorecard_screenshot
        workbook: scorecards
        sheet: System
        sections: match
        match:
          - "Safety & Security"
          - "Customer Experience"
          - "Operations"
        fallback_indices: [0, 1, 2]
        replace_existing_pictures: true
        fit: fill
        grow: 1.06
        optional: false

  # PPT 4 — System Scorecard from same System tab
  # People + Finance + Overall Total Score (no OPPORTUNITIES footer)
  - index: 3
    name: scorecard_summary_2
    keep_title: true
    elements:
      - type: scorecard_screenshot
        workbook: scorecards
        sheet: System
        sections: match
        match:
          - "People"
          - "Finance"
          - "Financial"
          - "Overall and Opportunities"
          - "Overall"
          - "Opportunities"
        fallback_indices: [3, 4, 5]
        replace_existing_pictures: true
        fit: fill
        grow: 1.06
        optional: false

  # PPT 5 — GIR from New GSE MPR Workings.xlsx → GIR tab
  # Fill native template chart + tables from the Workings dashboard (no screenshots).
  # Leading Issues / Action Plan body text cleared to empty editable boxes.
  - index: 4
    name: gir
    keep_title: true
    elements:
      - type: gir_workings_native
        workbook: workings
        sheet: "GIR"
        sheet_match: ["GIR"]
        clear_narrative: true
        optional: false

  # PPT 6 — EA Compliance / ASAP from New GSE MPR Workings.xlsx
  # One combined EA COMPLIANCE | ASAP REPORTING table screenshot (never duplicated).
  # Placed once into the template OLE slot; Leading Issues / Action Plan stay empty.
  - index: 5
    name: ea_asap
    keep_title: true
    elements:
      - type: ea_asap_workings_panels
        workbook: workings
        fit: fill
        clear_narrative: true
        optional: false
        # Optional hard pin if auto sheet pick is wrong:
        # sheet: "EAC"
        # sheet_match: ["EAC", "ASAP"]
  # PPT 7 — People from New GSE MPR Workings.xlsx → PEOPLE tab
  # First PEOPLE MTD/YTD/Score table screenshot + screenshots of the three Excel
  # graphs on that tab (Leadership Engagement, Psychological Safety, Accountability).
  # No native PowerPoint chart rebuilds — Excel graph screenshots only.
  # Leading Issues / Action Plans cleared to empty editable boxes.
  - index: 6
    name: people
    keep_title: true
    elements:
      - type: people_workings_panels
        workbook: workings
        sheet: "PEOPLE"
        sheet_match: ["PEOPLE", "People"]
        chart_count: 3
        # Screenshot Excel graphs: Leadership Engagement, Psychological Safety, Accountability.
        prefer_excel_com: true
        fit: fill
        clear_narrative: true
        optional: false

  # PPT 8 — Finance from New GSE MPR Workings.xlsx → FINANCE tab
  # Screenshot Regions | BUDGET $000s | OVERTIME | TOTAL HOURS (headers + data).
  - index: 7
    name: finance_overview
    keep_title: true
    elements:
      - type: finance_workings_panels
        workbook: workings
        sheet: "FINANCE"
        sheet_match: ["FINANCE", "Finance"]
        prefer_excel_com: true
        # contain so the full wide table (incl. TOTAL HOURS) stays visible
        fit: contain
        optional: false

  # PPT 9-10 — Finance comments: keep layout; empty Leading Issues / Action Plan boxes
  - index: 8
    name: finance_comments_1
    keep_title: true
    elements:
      - type: clear_narrative

  - index: 9
    name: finance_comments_2
    keep_title: true
    elements:
      - type: clear_narrative

  # PPT 11 — PMI Compliance from New GSE MPR Workings.xlsx → PMI tab
  # Regions MOTORIZED/STATIONARY + NON-MOTORIZED PMI table + Motorized/Stationary
  # Excel graph screenshots. Leading Issues / Action Plans emptied.
  - index: 10
    name: pmi
    keep_title: true
    elements:
      - type: pmi_workings_panels
        workbook: workings
        sheet: "PMI"
        sheet_match: ["PMI", "PMI COMPLIANCE"]
        prefer_excel_com: true
        fit: contain
        clear_narrative: true
        optional: false

  # PPT 12 — ISR Motorized from New GSE MPR Workings.xlsx → ISR tab
  # Regions RELIABILITY + SEVERITY table + Reliability/Severity Excel graphs only.
  # Leading Issues / Action Plans emptied.
  - index: 11
    name: isr
    keep_title: true
    elements:
      - type: isr_workings_panels
        workbook: workings
        sheet: "ISR"
        sheet_match: ["ISR", "ISR MOTORIZED"]
        prefer_excel_com: true
        fit: contain
        clear_narrative: true
        optional: false

  # PPT 13 — ISR comments: keep layout; empty Leading Issues / Action Plan boxes
  - index: 12
    name: isr_comments
    keep_title: true
    elements:
      - type: clear_narrative

  # PPT 14-19 — Entity scorecards (live sheets in 2026 - GSE Scorecards.xlsx)
  - index: 13
    name: north_scorecard_summary
    keep_title: true
    elements:
      - type: scorecard_screenshot
        workbook: scorecards
        sheet_match: ["Motorized"]
        sheet_index: 1
        sections: sheet
        replace_existing_pictures: true
        fit: fill
        optional: true

  - index: 14
    name: north_scorecard_comparison
    keep_title: true
    elements:
      - type: scorecard_screenshot
        workbook: scorecards
        sheet_match: ["REGION"]
        sheet: "REGION SUMMARY"
        sections: sheet
        replace_existing_pictures: true
        fit: fill
        optional: true

  - index: 15
    name: south_scorecard_summary
    keep_title: true
    elements:
      - type: scorecard_screenshot
        workbook: scorecards
        sheet_match: ["ACTUALS"]
        sheet: "ACTUALS"
        sections: sheet
        replace_existing_pictures: true
        fit: fill
        optional: true

  - index: 16
    name: south_scorecard_comparison
    keep_title: true
    elements:
      - type: scorecard_screenshot
        workbook: scorecards
        sheet_match: ["Weighting"]
        sheet: "Weighting Lookups"
        sections: sheet
        replace_existing_pictures: true
        fit: fill
        optional: true

  - index: 17
    name: stationary_scorecard_summary
    keep_title: true
    elements:
      - type: scorecard_screenshot
        workbook: scorecards
        sheet_match: ["Stationary"]
        sections: sheet
        replace_existing_pictures: true
        fit: fill
        optional: true

  - index: 18
    name: stationary_scorecard_comparison
    keep_title: true
    elements:
      - type: scorecard_screenshot
        workbook: scorecards
        sheet_match: ["GOALS"]
        sheet: "GOALS"
        sections: sheet
        replace_existing_pictures: true
        fit: fill
        optional: true

  # PPT 20 — Operations charts
  - index: 19
    name: operations
    keep_title: true
    elements:
      - type: chart_slide
        workbook: actuals
        charts:
          - title: "Jam Rate"
            patterns: ["Jams"]
          - title: "Clear Times"
            patterns: ["Clear Times", "Clear Time", "Times"]

  # PPT 21 — Operations narrative (manual)
  - index: 20
    name: operations_comments
    keep_title: true

  # PPT 22 — VOS chart
  - index: 21
    name: vos
    keep_title: true
    elements:
      - type: chart_slide
        workbook: actuals
        charts:
          - title: ""
            patterns: ["VOS (S)", "VOS"]

  # PPT 23 — Station of the Quarter (manual / template)
  - index: 22
    name: station_of_the_quarter
    keep_title: true

  # PPT 24-25 — Galley scorecards
  - index: 23
    name: galley_scorecard_summary
    keep_title: true
    elements:
      - type: scorecard_screenshot
        workbook: scorecards
        sheet_match: ["Galley"]
        sections: sheet
        replace_existing_pictures: true
        fit: fill
        optional: true

  - index: 24
    name: galley_scorecard_comparison
    keep_title: true
    elements:
      - type: scorecard_screenshot
        workbook: scorecards
        sheet_match: ["Galley"]
        sheet_match_index: 0
        sheet: "Galley GSE Template"
        sections: sheet
        replace_existing_pictures: true
        fit: fill
        optional: true